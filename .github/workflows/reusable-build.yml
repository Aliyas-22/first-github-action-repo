name: reuseable workflow
on:
  workflow_call:
    inputs:
      app_name:
        type: string
        required: true
      environment:
        type: string
        required: true
        default: staging
    secrets:
        docker_token:
         required: true
jobs:
  reuseable:
    runs-on: ubuntu-latest
    steps:
     - name: checkout the code
       uses: actions/checkout@v4

     - name: Print build info
       run: echo "Building ${{ inputs.app_name }} for ${{ inputs.environment }}"
     
     - name: Check Docker token
       run: |
        echo "Docker token is set: ${{ secrets.DOCKER_TOKEN != '' }}"
      
